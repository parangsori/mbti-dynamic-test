        const CHANGELOG = [

            {

                date: "2026.04.14",
                updates: [
                    "질문 데이터 초양극화 (정확도 대폭 향상)",
                    "오늘의 찰떡 궁합 & 회피 대상 기능 추가",
                    "나의 MBTI 기분 기록장 메뉴 신설",
                    "사용자 이름 세션 기억 기능 적용",
                    "해시태그 결과 다양화 (반복 문구 제거)"
                ]
            },
            {
                version: "v1.1.0",
                date: "2026.04.11",
                updates: [
                    "성향 스펙트럼 분석 한글 태그 추가",
                    "글래스모피즘 디자인 고도화",
                    "모바일 반응형 레이아웃 최적화"
                ]
            },
            {
                version: "v1.0.0",
                date: "2026.04.07",
                updates: [
                    "다이나믹 MBTI 테스트 정식 런칭",
                    "12문항 스낵 테스트 로직 구현",
                    "실시간 싱크로율 분석 알고리즘 적용"
                ]
            }
        ];

        const App = () => {
            const AXIS_META = [
                { pair: 'E/I', left: 'E', right: 'I', label: '에너지 방향' },
                { pair: 'S/N', left: 'S', right: 'N', label: '정보 해석' },
                { pair: 'T/F', left: 'T', right: 'F', label: '판단 기준' },
                { pair: 'J/P', left: 'J', right: 'P', label: '생활 리듬' }
            ];
            const DEFAULT_USERNAME = '익명 탐험가';
            const QUESTION_TEMPO_COPY = [
                "첫 느낌부터 꽤 선명해요",
                "오늘 결이 슬슬 보이기 시작했어요",
                "벌써 3문항째, 템포 좋아요",
                "지금부터는 취향의 결이 더 또렷해져요",
                "중간 지점 통과, 감으로 골라도 괜찮아요",
                "답변 흐름이 조금씩 모이고 있어요",
                "여기부터는 평소 습관이 은근히 드러나요",
                "후반부 진입, 생각보다 금방 끝나요",
                "거의 다 왔어요. 오늘 무드가 선명해지고 있어요",
                "이쯤이면 결과의 결이 꽤 잡혔어요",
                "마지막 두 문항, 느낌대로 밀어붙여도 좋아요",
                "마지막 선택이에요. 오늘의 무드 완성 직전"
            ];

            const [step, setStep] = useState('start');
            const [userName, setUserName] = useState(() => localStorage.getItem('mbti_username') || '');
            const [showHistory, setShowHistory] = useState(false);
            const [showVersionModal, setShowVersionModal] = useState(false);
            const [historyData, setHistoryData] = useState([]);

            useEffect(() => {
                const loaded = JSON.parse(localStorage.getItem('mbti_history') || '[]');
                setHistoryData(loaded);
            }, []);
            const [questions, setQuestions] = useState([]);
            const [currIdx, setCurrIdx] = useState(0);
            const [scores, setScores] = useState({ E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 });
            const [microCopy, setMicroCopy] = useState('');
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [shareCopied, setShareCopied] = useState(false);

            const getDisplayName = (name) => name.trim() || DEFAULT_USERNAME;

            const trackEvent = (name, payload = {}) => {
                const key = 'mbti_event_stats';
                const raw = JSON.parse(localStorage.getItem(key) || '{"counts":{},"recent":[]}');
                const counts = { ...raw.counts, [name]: (raw.counts[name] || 0) + 1 };
                const recent = [{ name, at: new Date().toISOString(), payload }, ...(raw.recent || [])].slice(0, 40);
                localStorage.setItem(key, JSON.stringify({ counts, recent }));
            };

            const getQuestionTempoMessage = (index) => {
                return QUESTION_TEMPO_COPY[index] || "지금의 결대로 가볍게 골라보세요";
            };

            const getOpeningPriority = (question) => {
                let score = 0;
                if (question.role === 'discriminator') score += 4;
                if (question.role === 'anchor') score += 3;
                if (question.q.length <= 26) score += 2;
                if (/오늘|친구|약속|톡|주말|카페|여행|단톡|소개팅|지금/.test(question.q)) score += 2;
                return score;
            };

            const sortQuestionsForTempo = (selected) => {
                const opening = [...selected]
                    .sort((a, b) => getOpeningPriority(b) - getOpeningPriority(a))
                    .slice(0, 3);
                const openingIds = new Set(opening.map(item => item.id));
                return [...opening, ...selected.filter(item => !openingIds.has(item.id))];
            };

            const openHistoryModal = () => {
                trackEvent('history_open', { step });
                setShowHistory(true);
            };

            const closeHistoryModal = () => setShowHistory(false);

            const openVersionInfo = () => {
                trackEvent('version_open');
                setShowVersionModal(true);
            };

            const closeVersionInfo = () => setShowVersionModal(false);

            const handleRestart = () => {
                trackEvent('restart_click');
                setShareCopied(false);
                setStep('start');
            };

            const handleStart = () => {
                const trimmedName = userName.trim();
                if (trimmedName) localStorage.setItem('mbti_username', trimmedName);
                else localStorage.removeItem('mbti_username');
                trackEvent('start_click', { hasName: Boolean(trimmedName) });

                // ── Phase 2: 구조형 랜덤 출제 ──────────────────────────────
                // 최근 3회 노출 ID 추적 (LocalStorage)
                const recentRaw = localStorage.getItem('mbti_recent_ids');
                const recentSessions = recentRaw ? JSON.parse(recentRaw) : []; // [[id,...], [id,...], [id,...]]
                const recentIds = new Set(recentSessions.flat());

                const axisKeys = ['EI', 'SN', 'TF', 'JP'];
                const selected = [];
                const usedFamilyIds = new Set();
                const usedIds = new Set();

                // 각 축마다 3문항씩 선발 (anchor 1개 보장 + familyId 중복 방지 + 최근 노출 제한)
                axisKeys.forEach(axis => {
                    // 기존 풀 + 확장 풀 병합
                    const basePool = window.QUESTIONS_DB[axis] || [];
                    const extPool = (window.QUESTIONS_EXTENDED && window.QUESTIONS_EXTENDED[axis]) || [];
                    const baseMeta = window.QUESTIONS_META[axis] || [];
                    const extMeta = (window.QUESTIONS_META_EXTENDED && window.QUESTIONS_META_EXTENDED[axis]) || [];

                    const pool = [...basePool, ...extPool];
                    const meta = [...baseMeta, ...extMeta];

                    // 문항 객체에 메타 병합 (인덱스 기반)
                    const enriched = pool.map((q, i) => ({
                        ...q,
                        id: meta[i].id,
                        familyId: meta[i].familyId,
                        role: meta[i].role,
                        weight: meta[i].weight,
                        _axis: axis
                    }));

                    // 최근 노출 제외 후 후보 풀 구성
                    const candidates = enriched.filter(q => !recentIds.has(q.id));
                    // 후보가 너무 적으면 전체 풀로 폴백
                    const pool2 = candidates.length >= 4 ? candidates : enriched;

                    // 1) anchor 1개 (필수)
                    const anchors = pool2.filter(q => q.role === 'anchor' && !usedFamilyIds.has(q.familyId));
                    const anchor = anchors.length > 0
                        ? anchors[Math.floor(Math.random() * anchors.length)]
                        : pool2[Math.floor(Math.random() * pool2.length)];

                    usedFamilyIds.add(anchor.familyId);
                    usedIds.add(anchor.id);
                    selected.push(anchor);

                    // 2) 나머지 2개 (discriminator/state/consistency 혼합, familyId 중복 금지)
                    const rest = pool2.filter(q =>
                        !usedIds.has(q.id) &&
                        !usedFamilyIds.has(q.familyId)
                    );
                    // weight 기반 가중 샘플링
                    const totalW = rest.reduce((s, q) => s + q.weight, 0);
                    const pick = (exclude) => {
                        let r = Math.random() * totalW;
                        for (const q of rest) {
                            if (exclude.has(q.id) || usedFamilyIds.has(q.familyId)) continue;
                            r -= q.weight;
                            if (r <= 0) return q;
                        }
                        // 폴백: 사용 가능한 첫 번째 문항
                        return rest.find(q => !exclude.has(q.id) && !usedFamilyIds.has(q.familyId)) || rest[0];
                    };

                    const pick1 = pick(usedIds);
                    if (pick1) {
                        usedFamilyIds.add(pick1.familyId);
                        usedIds.add(pick1.id);
                        selected.push(pick1);
                    }
                    const pick2 = pick(usedIds);
                    if (pick2) {
                        usedFamilyIds.add(pick2.familyId);
                        usedIds.add(pick2.id);
                        selected.push(pick2);
                    }
                });

                // 12문항 셔플
                selected.sort(() => Math.random() - 0.5);
                const tempoOrdered = sortQuestionsForTempo(selected);

                // 이번 세션 노출 ID 저장 (최근 3회 유지)
                const thisSession = tempoOrdered.map(q => q.id);
                const updated = [thisSession, ...recentSessions].slice(0, 3);
                localStorage.setItem('mbti_recent_ids', JSON.stringify(updated));
                // ────────────────────────────────────────────────────────────

                setQuestions(tempoOrdered);
                setScores({ E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 });
                setCurrIdx(0);
                setMicroCopy('');
                setShareCopied(false);
                setStep('question');
            };

            const handleAnswer = (option) => {
                if (isTransitioning) return;
                setIsTransitioning(true);

                // Phase 3: 가중 점수화 (문항의 weight 반영)
                const currentQ = questions[currIdx];
                const w = (currentQ && currentQ.weight) ? currentQ.weight : 1.0;
                setScores(prev => ({ ...prev, [option.type]: prev[option.type] + w }));
                setMicroCopy(option.micro);

                setTimeout(() => {
                    setMicroCopy('');
                    if (currIdx + 1 >= 12) {
                        trackEvent('complete_test');
                        setStep('result');
                    } else {
                        setCurrIdx(prev => prev + 1);
                    }
                    setIsTransitioning(false);
                }, 800);
            };

            const getAxisNarratives = (spectrum) => {
                const copyMap = {
                    E: "오늘은 혼자보다 사람 속에서 에너지가 더 살아나는 흐름이었어요.",
                    I: "오늘은 사람보다 내 페이스를 지키는 쪽이 더 편하게 느껴졌어요.",
                    S: "아이디어보다 눈앞의 사실과 익숙한 기준에 더 손이 갔어요.",
                    N: "정답보다 가능성과 큰 그림 쪽으로 시선이 더 먼저 움직였어요.",
                    T: "감정보다 기준과 판단을 먼저 세우는 흐름이 비교적 또렷했어요.",
                    F: "결론보다 분위기와 관계의 온도를 함께 살피는 쪽에 가까웠어요.",
                    J: "열어두기보다 정리하고 결론 내리는 흐름이 더 편했어요.",
                    P: "딱 맞춰 움직이기보다 상황에 맞게 유연하게 가는 쪽이 자연스러웠어요."
                };

                return spectrum.map((item) => {
                    const dominantLabel = item.dominantType === item.left ? item.leftLabel : item.rightLabel;
                    return {
                        ...item,
                        pair: `${item.left}/${item.right}`,
                        dominantLabel,
                        narrative: copyMap[item.dominantType],
                        stateLabel: item.isBoundary ? "상황 영향이 큰 축" : "비교적 안정적인 축"
                    };
                });
            };

            const getResultSummary = (mbti, spectrum, percent) => {
                const strongestAxis = [...spectrum].sort((a, b) => b.intensity - a.intensity)[0];
                const boundaryCount = spectrum.filter(item => item.isBoundary).length;
                const strongestLabel = strongestAxis.dominantType === strongestAxis.left ? strongestAxis.leftLabel : strongestAxis.rightLabel;

                if (boundaryCount >= 2) {
                    return `오늘은 ${mbti} 쪽으로 기울었지만, 몇몇 축은 기분과 상황에 따라 꽤 유연하게 움직이고 있어요.`;
                }
                if (percent >= 85) {
                    return `오늘은 ${strongestLabel} 흐름이 확실했어요. 여러 답변에서 비슷한 결이 또렷하게 이어졌어요.`;
                }
                return `오늘은 ${strongestLabel} 쪽이 조금 더 강했어요. 다만 몇몇 판단 축에서는 다른 결도 함께 보였어요.`;
            };

            const getConsistencyCopy = (percent, boundaryAxes) => {
                if (percent >= 88) {
                    return "오늘 답변의 결이 꽤 또렷했어요. 여러 축에서 비슷한 방향의 선택이 자연스럽게 이어졌어요.";
                }
                if (boundaryAxes.length === 0) {
                    return "오늘의 흐름은 비교적 분명했어요. 다만 상황이 바뀌면 세부 톤은 충분히 달라질 수 있어요.";
                }
                return "한쪽으로 딱 고정되기보다 여러 결이 함께 보였어요. 그래서 오늘 상태가 더 많이 반영된 결과에 가까워요.";
            };

            const getBoundaryCopy = (boundaryAxes) => {
                if (boundaryAxes.length === 0) {
                    return "이번에는 크게 흔들리는 축이 많지 않았어요. 오늘의 선택 기준이 비교적 안정적으로 유지된 편이에요.";
                }
                const axisNames = boundaryAxes.map(a => `${a.left}/${a.right}`).join(', ');
                return `${axisNames} 축은 우세 차이가 크지 않았어요. 누구와 함께 있느냐, 컨디션이 어떤지에 따라 가장 먼저 달라질 수 있는 영역이에요.`;
            };

            const getCompatibilityCopy = (mbti) => {
                const pair = COMPATIBILITY[mbti] || { good: "알 수 없음", bad: "알 수 없음" };
                return {
                    good: {
                        type: pair.good,
                        title: "오늘 잘 통할 가능성이 높은 유형",
                        description: "대화 템포와 반응 방식이 자연스럽게 맞물릴 수 있어요."
                    },
                    bad: {
                        type: pair.bad,
                        title: "오늘은 살짝 부딪힐 수 있는 유형",
                        description: "우선순위나 표현 방식이 엇갈리면 괜히 피곤하게 느껴질 수 있어요."
                    }
                };
            };

            const getHistoryComparison = (currentMbti, historyData) => {
                if (!historyData.length) return null;

                const previousEntry = historyData.length > 1 ? historyData[1] : null;
                if (!previousEntry) {
                    return {
                        title: "오늘 결과가 첫 기준점이에요",
                        body: "다음 기록부터는 어떤 축이 달라졌는지, 오늘과 무엇이 달라졌는지 바로 비교해볼 수 있어요."
                    };
                }

                const changedAxes = currentMbti
                    .split('')
                    .map((char, idx) => (char !== previousEntry.mbti[idx] ? idx : null))
                    .filter(idx => idx !== null)
                    .map(idx => ['E/I', 'S/N', 'T/F', 'J/P'][idx]);

                if (changedAxes.length === 0) {
                    return {
                        title: `직전 기록(${previousEntry.date})과 같은 흐름이에요`,
                        body: `최근 두 번 모두 ${currentMbti}로 나왔어요. 요즘의 선택 기준이 꽤 비슷하게 유지되고 있다는 뜻으로 볼 수 있어요.`
                    };
                }

                return {
                    title: `직전 기록(${previousEntry.date})과 ${changedAxes.length}개 축이 달라졌어요`,
                    body: `${changedAxes.join(', ')} 축의 결이 달라졌어요. 지금 컨디션이나 주변 상황 변화가 자연스럽게 반영된 결과일 수 있어요.`
                };
            };

            const getEffectiveHistory = (currentMbti, percent, historyData) => {
                if (!currentMbti) return historyData;

                const todayEntry = {
                    date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', weekday: 'short' }),
                    mbti: currentMbti,
                    percent
                };

                if (!historyData.length) return [todayEntry];
                if (historyData[0].mbti === todayEntry.mbti && historyData[0].date === todayEntry.date) return historyData;
                return [todayEntry, ...historyData].slice(0, 7);
            };

            const getAxisChangeDetails = (currentMbti, previousMbti) => {
                if (!currentMbti || !previousMbti) return [];

                return AXIS_META.map((axis, idx) => {
                    const before = previousMbti[idx];
                    const after = currentMbti[idx];
                    if (before === after) return null;

                    return {
                        ...axis,
                        before,
                        after,
                        title: `${axis.label} 변화`,
                        description: `${before}에서 ${after} 쪽으로 기울었어요.`
                    };
                }).filter(Boolean);
            };

            const getHistoryInsights = (historyData) => {
                if (!historyData.length) return null;

                const recent = historyData.slice(0, 5);
                const countMap = recent.reduce((acc, item) => {
                    acc[item.mbti] = (acc[item.mbti] || 0) + 1;
                    return acc;
                }, {});

                const topType = Object.entries(countMap).sort((a, b) => b[1] - a[1])[0];

                let stableCount = 1;
                for (let i = 1; i < recent.length; i++) {
                    if (recent[i].mbti === recent[0].mbti) stableCount += 1;
                    else break;
                }

                const volatility = AXIS_META.map((axis, idx) => {
                    let flips = 0;
                    for (let i = 0; i < recent.length - 1; i++) {
                        if (recent[i].mbti[idx] !== recent[i + 1].mbti[idx]) flips += 1;
                    }

                    return { ...axis, flips };
                }).sort((a, b) => b.flips - a.flips);

                const mostVolatile = volatility[0];
                const mostStable = [...volatility].sort((a, b) => a.flips - b.flips)[0];

                return {
                    recentCount: recent.length,
                    topType: topType ? { mbti: topType[0], count: topType[1] } : null,
                    stableCount,
                    mostVolatile,
                    mostStable
                };
            };

            const getHistoryEntryNote = (item, idx, historyData) => {
                const nextEntry = historyData[idx + 1];
                if (!nextEntry) return "기준점이 되는 기록";

                const changedAxes = getAxisChangeDetails(item.mbti, nextEntry.mbti);
                if (!changedAxes.length) {
                    return `직전 기록과 같은 ${item.mbti} 흐름`;
                }

                return `${changedAxes.map(axis => axis.pair).join(', ')} 축 변화`;
            };

            const getShareMoodLine = (mbti, info, percent, summaryCopy) => {
                const moodLead = percent >= 85
                    ? `오늘은 ${mbti} 모드가 꽤 선명한 날`
                    : `오늘은 ${mbti} 쪽으로 조금 더 기울어진 날`;
                return `${moodLead} · ${info.nickname}`;
            };

            const ResultView = () => {
                const resultRef = useRef(null);

                const getResult = () => {
                    // Phase 3: 가중 점수 기반 축별 강도 계산
                    const axes = [
                        { left: 'E', right: 'I', leftLabel: '외향적', rightLabel: '내향적' },
                        { left: 'S', right: 'N', leftLabel: '현실적', rightLabel: '직관적' },
                        { left: 'T', right: 'F', leftLabel: '이성적', rightLabel: '감성적' },
                        { left: 'J', right: 'P', leftLabel: '계획적', rightLabel: '유연함' }
                    ];

                    const axisResults = axes.map(({ left, right, leftLabel, rightLabel }) => {
                        const lScore = scores[left] || 0;
                        const rScore = scores[right] || 0;
                        const total = lScore + rScore || 1; // 0으로 나눔 방지
                        const dominantType = lScore >= rScore ? left : right;
                        const dominantScore = Math.max(lScore, rScore);
                        // intensity: 해당 축에서 우세한 쪽의 비율 (50~100%)
                        const intensity = Math.round((dominantScore / total) * 100);
                        const isBoundary = intensity < 62; // 62% 미만 → 경계 축
                        return {
                            left, right, leftLabel, rightLabel,
                            leftScore: lScore, rightScore: rScore,
                            dominantType, intensity, isBoundary
                        };
                    });

                    const mbti = axisResults.map(a => a.dominantType).join('');

                    // 싱크로율: 축별 intensity 평균 (더 의미 있는 지표)
                    const percent = Math.round(
                        axisResults.reduce((sum, a) => sum + a.intensity, 0) / 4
                    );

                    // 배지: intensity 기반 (75%+ → 3점 배지, 미만 → 2점 배지)
                    const badges = axisResults.map(a => {
                        const t = a.dominantType;
                        return a.intensity >= 75 ? window.BADGES[t][3] : window.BADGES[t][2];
                    });

                    const info = window.MBTI_RESULTS[mbti];

                    // 스펙트럼 바용 데이터 (기존 UI 호환)
                    const spectrum = axisResults;

                    // 경계 축 목록 (UI 보조 문구용)
                    const boundaryAxes = axisResults.filter(a => a.isBoundary);

                    return { mbti, info, badges, percent, spectrum, boundaryAxes };
                };

                const { mbti, info, badges, percent, spectrum, boundaryAxes } = getResult();

                useEffect(() => {
                    const history = JSON.parse(localStorage.getItem('mbti_history') || '[]');
                    const newEntry = {
                        date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', weekday: 'short' }),
                        mbti: mbti,
                        percent: percent
                    };
                    if (!history.length || history[0].mbti !== mbti || history[0].date !== newEntry.date) {
                        const updated = [newEntry, ...history].slice(0, 7);
                        localStorage.setItem('mbti_history', JSON.stringify(updated));
                        setHistoryData(updated);
                    }
                }, [mbti, percent]);

                const compCopy = getCompatibilityCopy(mbti);
                const axisNarratives = getAxisNarratives(spectrum);
                const summaryCopy = getResultSummary(mbti, spectrum, percent);
                const consistencyCopy = getConsistencyCopy(percent, boundaryAxes);
                const boundaryCopy = getBoundaryCopy(boundaryAxes);
                const effectiveHistory = getEffectiveHistory(mbti, percent, historyData);
                const historyComparison = getHistoryComparison(mbti, effectiveHistory);
                const axisChanges = getAxisChangeDetails(mbti, effectiveHistory[1]?.mbti);
                const historyInsights = getHistoryInsights(effectiveHistory);
                const displayName = getDisplayName(userName);
                const shareMoodLine = getShareMoodLine(mbti, info, percent, summaryCopy);

                useEffect(() => {
                    trackEvent('result_view', { mbti, percent });
                }, [mbti, percent]);

                const handleCopyShare = async () => {
                    const shareText = `${displayName}님의 오늘 결과\n${shareMoodLine}\n${summaryCopy}\n싱크로율 ${percent}%`;
                    try {
                        await navigator.clipboard.writeText(shareText);
                        setShareCopied(true);
                        trackEvent('share_copy', { mbti });
                        setTimeout(() => setShareCopied(false), 1800);
                    } catch (error) {
                        setShareCopied(false);
                    }
                };

                // 다이나믹 칭호 로직
                let dynamicTitle = "";
                if (percent >= 90) dynamicTitle = `[순도 ${percent}% 완벽한 ${mbti} 모드]`;
                else if (percent >= 70) dynamicTitle = `[확고한 ${mbti}의 하루]`;
                else dynamicTitle = `[외향과 내향, 이성과 감성이 섞인 ${mbti}]`;

                return (
                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex flex-col items-center w-full min-h-[100dvh] p-6 text-white pb-20">
                        <div ref={resultRef} className="bg-slate-900 p-8 w-full max-w-sm flex flex-col items-center mt-6 rounded-3xl border border-white/10 shadow-2xl relative overflow-hidden">
                            {/* Inner card background effects */}
                            <div className="absolute top-0 right-0 w-32 h-32 bg-brand/20 blur-3xl rounded-full"></div>
                            <div className="absolute bottom-0 left-0 w-32 h-32 bg-cyan-500/20 blur-3xl rounded-full"></div>

                            <div className="relative z-10 flex flex-col items-center w-full">
                                <h2 className="text-xl font-light text-slate-300 mb-2 mt-2">
                                    <span className="font-bold text-white">{displayName}</span>님의 오늘 성향 스냅샷
                                </h2>

                                <div className="relative mb-3 mt-3">
                                    <h1 className="text-6xl font-black bg-gradient-to-r from-brand to-cyan-400 bg-clip-text text-transparent tracking-widest drop-shadow-sm">
                                        {mbti}
                                    </h1>
                                    <div className="absolute -top-4 -right-10 bg-brand text-white px-2.5 py-1 rounded-full text-[11px] font-black shadow-lg shadow-purple-500/30 transform rotate-12 border border-white/20 whitespace-nowrap">
                                        싱크로율 {percent}%
                                    </div>
                                </div>
                                <p className="text-xl font-bold text-center text-slate-100">{info.nickname}</p>
                                <p className="text-sm font-bold text-brand bg-brand/10 px-3 py-1 rounded-full mt-3 border border-brand/20 shadow-inner">
                                    {dynamicTitle}
                                </p>

                                <div className="w-full mt-4 rounded-2xl border border-white/10 bg-white/5 px-4 py-4 text-center">
                                    <p className="text-[11px] font-bold tracking-[0.2em] text-slate-400 uppercase">오늘의 공유 한 줄</p>
                                    <p className="mt-2 text-[18px] font-black leading-snug text-white break-keep">{shareMoodLine}</p>
                                    <button
                                        onClick={handleCopyShare}
                                        className="mt-3 inline-flex items-center justify-center rounded-full border border-cyan-400/20 bg-cyan-400/10 px-4 py-2 text-[12px] font-bold text-cyan-100 hover:bg-cyan-400/15 transition-colors"
                                    >
                                        {shareCopied ? '복사 완료' : '한 줄 결과 복사'}
                                    </button>
                                </div>

                                {info.image && (
                                    <div className="w-full mt-6 mb-6 flex justify-center">
                                        <div className="relative w-56 h-56 rounded-[2rem] border border-white/10 bg-[radial-gradient(circle_at_top,_rgba(34,211,238,0.18),_transparent_48%),linear-gradient(180deg,rgba(15,23,42,0.96),rgba(2,6,23,0.92))] shadow-[0_20px_60px_rgba(2,6,23,0.55)] overflow-hidden flex items-center justify-center isolate">
                                            <div className="absolute inset-x-6 top-4 h-16 rounded-full bg-cyan-400/15 blur-2xl"></div>
                                            <div className="absolute inset-x-8 bottom-4 h-20 rounded-full bg-brand/15 blur-2xl"></div>
                                            <div className="absolute inset-0 border border-white/5 rounded-[2rem]"></div>
                                            <img
                                                src={window.IMAGE_BASE64 && window.IMAGE_BASE64[info.image] ? window.IMAGE_BASE64[info.image] : info.image}
                                                alt={mbti}
                                                className="relative z-10 w-44 h-44 object-contain drop-shadow-[0_14px_30px_rgba(15,23,42,0.75)]"
                                            />
                                        </div>
                                    </div>
                                )}

                                <div className="w-full mt-6 mb-5 rounded-2xl border border-cyan-400/20 bg-cyan-400/10 px-5 py-4 text-center">
                                    <p className="text-[15px] font-semibold leading-relaxed text-cyan-50 break-keep">
                                        {summaryCopy}
                                    </p>
                                </div>

                                <div className="w-full mb-6 rounded-2xl border border-white/10 bg-black/25 px-4 py-4 text-center">
                                    <p className="text-[11px] font-bold tracking-[0.2em] text-slate-400 uppercase">오늘 답변 기준 성향 흐름</p>
                                    <p className="mt-2 text-2xl font-black text-white">{percent}%</p>
                                    <p className="mt-2 text-[13px] leading-relaxed text-slate-300 break-keep">{consistencyCopy}</p>
                                </div>

                                {historyComparison && (
                                    <div className="w-full mb-6 rounded-2xl border border-emerald-400/20 bg-emerald-400/10 px-4 py-4">
                                        <p className="text-[11px] font-bold tracking-[0.2em] text-emerald-200 uppercase">직전 결과와 비교</p>
                                        <p className="mt-2 text-[15px] font-semibold leading-relaxed text-white break-keep">{historyComparison.title}</p>
                                        <p className="mt-2 text-[12px] leading-relaxed text-emerald-50/90 break-keep">{historyComparison.body}</p>
                                        {axisChanges.length > 0 && (
                                            <div className="mt-3 flex flex-wrap gap-2">
                                                {axisChanges.map((axis) => (
                                                    <span key={axis.pair} className="px-3 py-1 rounded-full border border-emerald-300/20 bg-black/20 text-[11px] font-semibold text-emerald-100">
                                                        {axis.pair} {axis.before}→{axis.after}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        {historyInsights?.stableCount >= 2 && (
                                            <p className="mt-3 text-[11px] text-emerald-100/80">
                                                최근 {historyInsights.stableCount}회 연속 {mbti} 흐름이 이어지고 있어요.
                                            </p>
                                        )}
                                    </div>
                                )}

                                {historyInsights && (
                                    <div className="grid w-full grid-cols-2 gap-3 mb-6">
                                        <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-4">
                                            <p className="text-[11px] font-bold tracking-[0.15em] text-slate-400 uppercase">요즘 가장 자주 나온 흐름</p>
                                            <p className="mt-2 text-2xl font-black text-white">{historyInsights.topType?.mbti || mbti}</p>
                                            <p className="mt-1 text-[11px] text-slate-300 break-keep">
                                                최근 {historyInsights.recentCount}회 중 {historyInsights.topType?.count || 1}회
                                            </p>
                                        </div>
                                        <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-4">
                                            <p className="text-[11px] font-bold tracking-[0.15em] text-slate-400 uppercase">가장 잘 흔들리는 축</p>
                                            <p className="mt-2 text-lg font-black text-white">{historyInsights.mostVolatile?.pair || '-'}</p>
                                            <p className="mt-1 text-[11px] text-slate-300 break-keep">
                                                {historyInsights.mostVolatile?.flips
                                                    ? `${historyInsights.mostVolatile.flips}번 바뀌었어요`
                                                    : "최근엔 거의 그대로였어요"}
                                            </p>
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-wrap gap-2 justify-center mb-8">
                                    {badges.map((b, i) => (
                                        <span key={i} className="px-3 py-1.5 bg-white/5 border border-white/20 rounded-full text-[13px] font-semibold text-cyan-200">
                                            #{b}
                                        </span>
                                    ))}
                                </div>

                                <div className="bg-white/5 rounded-2xl p-5 w-full border border-white/5 backdrop-blur-sm">
                                    <p className="text-center text-[15px] leading-relaxed mb-4 text-slate-200">{info.description}</p>
                                    <div className="bg-black/30 rounded-xl p-4 text-[14px] font-medium text-slate-300 text-center leading-snug break-keep relative border border-white/5 pb-5">
                                        <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-800 text-[10px] text-purple-300 px-3 py-0.5 rounded-full border border-brand/30">상황극</div>
                                        <span className="text-brand mr-1">"</span>
                                        {info.scenario}
                                        <span className="text-brand ml-1">"</span>
                                    </div>

                                    {/* 스펙트럼 바 분석 */}
                                    <div className="pt-6 border-t border-white/10 mt-6">
                                        <h3 className="text-[13px] font-black text-slate-400 mb-4 text-center tracking-wider">성향 밸런스 분석</h3>
                                        <div className="mb-4 rounded-xl border border-white/10 bg-black/20 px-4 py-4">
                                            <p className="text-[12px] font-semibold text-white text-center">이번 결과에서 읽히는 핵심 포인트</p>
                                            <p className="mt-2 text-[12px] leading-relaxed text-slate-300 text-center break-keep">
                                                {boundaryCopy}
                                            </p>
                                        </div>
                                        <div className="flex flex-col gap-4 px-1">
                                            {axisNarratives.map((item, idx) => {
                                                // Phase 3: intensity(50~100%) 기반 비율 계산
                                                const leftRatio = item.leftScore >= item.rightScore
                                                    ? item.intensity
                                                    : 100 - item.intensity;
                                                const rightRatio = 100 - leftRatio;
                                                const isLeftDom = item.leftScore >= item.rightScore;

                                                return (
                                                    <div key={idx} className={`rounded-xl border px-3 py-3 ${item.isBoundary ? 'border-yellow-500/30 bg-yellow-500/5' : 'border-white/5 bg-black/10'}`}>
                                                        <div className="mb-3 flex items-start justify-between gap-3">
                                                            <div>
                                                                <p className="text-[12px] font-black text-white tracking-wide">{item.pair || `${item.left}/${item.right}`}</p>
                                                                <p className="mt-1 text-[10px] font-semibold text-slate-400">{item.stateLabel}</p>
                                                            </div>
                                                            <span className={`px-2.5 py-1 rounded-full text-[10px] font-bold border ${item.isBoundary ? 'border-yellow-400/30 bg-yellow-500/10 text-yellow-200' : 'border-cyan-400/20 bg-cyan-400/10 text-cyan-100'}`}>
                                                                {item.dominantType} 우세 {item.intensity}%
                                                            </span>
                                                        </div>
                                                        <div className="flex items-center gap-2 text-[12px] font-bold text-slate-400">
                                                            <div className="flex flex-col items-center justify-center w-10">
                                                                <span className={`text-center ${isLeftDom ? 'text-brand text-[16px] drop-shadow-[0_0_8px_rgba(168,85,247,0.8)]' : ''}`}>{item.left}</span>
                                                                <span className={`text-[9px] -mt-0.5 ${isLeftDom ? 'text-purple-300' : 'text-slate-500'}`}>{item.leftLabel}</span>
                                                            </div>
                                                            <div className="flex-1">
                                                                <div className="h-3 bg-slate-800/80 rounded-full overflow-hidden flex relative shadow-inner">
                                                                    <motion.div
                                                                        initial={{ width: 0 }}
                                                                        animate={{ width: `${leftRatio}%` }}
                                                                        transition={{ duration: 1, delay: 0.1 * idx, type: 'spring' }}
                                                                        className="h-full bg-gradient-to-r from-brand to-purple-400"
                                                                    />
                                                                    <motion.div
                                                                        initial={{ width: 0 }}
                                                                        animate={{ width: `${rightRatio}%` }}
                                                                        transition={{ duration: 1, delay: 0.1 * idx, type: 'spring' }}
                                                                        className="h-full bg-gradient-to-l from-cyan-400 to-cyan-600"
                                                                    />
                                                                </div>
                                                            </div>
                                                            <div className="flex flex-col items-center justify-center w-10">
                                                                <span className={`text-center ${!isLeftDom ? 'text-cyan-400 text-[16px] drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]' : ''}`}>{item.right}</span>
                                                                <span className={`text-[9px] -mt-0.5 ${!isLeftDom ? 'text-cyan-200' : 'text-slate-500'}`}>{item.rightLabel}</span>
                                                            </div>
                                                        </div>
                                                        <p className="mt-3 text-[12px] leading-relaxed text-slate-300 break-keep">
                                                            <span className="font-bold text-white">{item.dominantType} 쪽이 더 강했어요.</span> {item.narrative}
                                                        </p>
                                                    </div>
                                                )
                                            })}
                                        </div>

                                        {/* 오늘의 궁합 해석 */}
                                        <div className="flex gap-3 w-full mt-6">
                                            <div className="flex-1 bg-gradient-to-br from-green-500/10 to-emerald-500/5 border border-green-500/20 rounded-xl p-3 flex flex-col items-center justify-center relative overflow-hidden">
                                                <div className="absolute top-0 right-0 w-16 h-16 bg-green-500/10 blur-xl rounded-full"></div>
                                                <span className="text-[10px] text-green-300 font-bold mb-1 text-center">{compCopy.good.title}</span>
                                                <span className="text-xl font-black text-green-400 mb-0.5">{compCopy.good.type}</span>
                                                <span className="text-[9px] text-green-200/80 text-center font-medium leading-tight tracking-tight break-keep">{window.MBTI_RESULTS[compCopy.good.type]?.nickname}</span>
                                                <p className="mt-2 text-[10px] text-center leading-snug text-green-100/80 break-keep">{compCopy.good.description}</p>
                                            </div>
                                            <div className="flex-1 bg-gradient-to-br from-red-500/10 to-rose-500/5 border border-red-500/20 rounded-xl p-3 flex flex-col items-center justify-center relative overflow-hidden">
                                                <div className="absolute bottom-0 left-0 w-16 h-16 bg-red-500/10 blur-xl rounded-full"></div>
                                                <span className="text-[10px] text-red-300 font-bold mb-1 text-center">{compCopy.bad.title}</span>
                                                <span className="text-xl font-black text-red-400 mb-0.5">{compCopy.bad.type}</span>
                                                <span className="text-[9px] text-red-200/80 text-center font-medium leading-tight tracking-tight break-keep">{window.MBTI_RESULTS[compCopy.bad.type]?.nickname}</span>
                                                <p className="mt-2 text-[10px] text-center leading-snug text-red-100/80 break-keep">{compCopy.bad.description}</p>
                                            </div>
                                        </div>

                                        <div className="mt-6 rounded-xl border border-brand/20 bg-brand/10 px-4 py-4">
                                            <p className="text-[12px] font-bold text-brand">내일의 나는 또 다를 수 있어요</p>
                                            <p className="mt-2 text-[12px] leading-relaxed text-slate-300 break-keep">
                                                이 결과는 오늘의 기분, 에너지, 관계 맥락이 반영된 스냅샷에 가까워요. 다른 날 다시 해보면 경계 축이나 우세 흐름이 조금씩 다르게 나타날 수 있어요.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col gap-3 w-full max-w-sm mt-8">
                            <button onClick={openHistoryModal} className="w-full py-4 bg-white/5 border border-white/10 rounded-3xl text-slate-200 font-bold hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
                                🕒 나의 MBTI 기록 보기
                            </button>
                            <button onClick={handleRestart} className="w-full py-4 mt-2 text-slate-400 underline underline-offset-4 decoration-slate-600 font-medium hover:text-slate-200 transition-colors">
                                지금 다시 해보기
                            </button>
                        </div>
                    </motion.div>
                );
            };

            const latestHistoryComparison = getHistoryComparison(historyData[0]?.mbti || '', historyData);
            const latestHistoryInsights = getHistoryInsights(historyData);

            return (
                <div className={`w-full min-h-[100dvh] flex flex-col items-center ${step !== 'result' ? 'justify-center' : 'pt-10'}`}>
                    <AnimatePresence mode="wait">
                        {step === 'start' && (
                            <motion.div key="start" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="w-full max-w-sm flex flex-col items-center px-6">
                                <div className="w-24 h-24 mb-6 rounded-3xl bg-gradient-to-br from-brand to-cyan-400 rotate-12 flex items-center justify-center shadow-2xl shadow-brand/40">
                                    <span className="text-4xl text-white font-black -rotate-12">MBTI</span>
                                </div>
                                <h1 className="text-4xl font-extrabold mb-3 text-center text-white tracking-tight">지금 내 결은 어느 쪽이 더 강할까?</h1>
                                <p className="text-slate-300 mb-10 text-center font-medium leading-relaxed">
                                    12문항으로 오늘의 무드와 성향 흐름을<br />가볍고 재밌게 확인해보세요
                                </p>

                                <div className="w-full bg-white/5 p-2 rounded-3xl mb-8 backdrop-blur-xl border border-white/10 relative shadow-inner">
                                    <input
                                        value={userName}
                                        onChange={e => setUserName(e.target.value)}
                                        placeholder="이름은 선택이에요 (비워도 바로 시작)"
                                        className="w-full bg-transparent text-white placeholder-slate-400 text-center text-xl py-4 outline-none font-bold"
                                        maxLength="10"
                                        onKeyPress={(e) => e.key === 'Enter' && handleStart()}
                                    />
                                    <div className="absolute inset-x-8 bottom-3 h-[2px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-50"></div>
                                </div>

                                <button
                                    onClick={handleStart}
                                    className="w-full py-5 rounded-3xl font-black text-xl transition-all duration-300 bg-gradient-to-r from-brand to-cyan-500 text-white shadow-[0_0_40px_rgba(168,85,247,0.4)] hover:scale-[1.02] active:scale-[0.98]"
                                >
                                    바로 시작하기
                                </button>

                                <p className="mt-4 text-[12px] text-slate-400 text-center break-keep">
                                    이름 없이도 1초 안에 시작할 수 있어요
                                </p>

                                {historyData.length > 0 && (
                                    <button onClick={openHistoryModal} className="mt-6 text-sm text-slate-400 underline underline-offset-4 hover:text-white transition-colors">
                                        🕒 나의 이전 기록 보기
                                    </button>
                                )}
                            </motion.div>
                        )}

                        {step === 'question' && (
                            <motion.div key="question" initial={{ opacity: 0, x: 50 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -50 }} className="w-full min-h-[100dvh] flex flex-col max-w-sm pt-12 pb-10 px-6">
                                <div className="w-full mb-10">
                                    <div className="flex justify-between items-end mb-3 text-slate-300 font-bold">
                                        <span className="text-2xl bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-brand tracking-widest italic">Q{currIdx + 1}</span>
                                        <span className="text-sm font-medium bg-white/10 px-3 py-1 rounded-full">{currIdx + 1} / 12</span>
                                    </div>
                                    <div className="h-2.5 w-full bg-slate-800 rounded-full overflow-hidden border border-white/5">
                                        <motion.div
                                            className="h-full bg-gradient-to-r from-cyan-400 to-brand delay-100 ease-out"
                                            initial={{ width: `${((currIdx) / 12) * 100}%` }}
                                            animate={{ width: `${((currIdx + 1) / 12) * 100}%` }}
                                            transition={{ duration: 0.5, type: 'spring' }}
                                        />
                                    </div>
                                    <p className="mt-3 text-[12px] text-center font-semibold text-cyan-200/90 break-keep">
                                        {getQuestionTempoMessage(currIdx)}
                                    </p>
                                </div>

                                <div className="flex-[0.8] flex flex-col justify-center mb-8">
                                    <AnimatePresence mode="wait">
                                        <motion.h2
                                            key={currIdx}
                                            initial={{ opacity: 0, y: 20 }}
                                            animate={{ opacity: 1, y: 0 }}
                                            exit={{ opacity: 0, y: -20 }}
                                            transition={{ duration: 0.3 }}
                                            className="text-[26px] font-bold text-white leading-snug break-keep text-center"
                                        >
                                            {questions[currIdx].q}
                                        </motion.h2>
                                    </AnimatePresence>
                                </div>

                                <div className="flex flex-col gap-4 relative w-full">
                                    {questions[currIdx].options.map((opt, i) => (
                                        <button
                                            key={i}
                                            onClick={() => handleAnswer(opt)}
                                            disabled={isTransitioning}
                                            className={`w-full p-6 rounded-3xl bg-white/5 border border-white/10 text-white font-medium text-[16px] hover:bg-white/10 active:bg-white/20 active:scale-[0.98] transition-all text-center break-keep shadow-lg ${isTransitioning ? 'opacity-40 scale-95' : 'opacity-100'
                                                }`}
                                        >
                                            {opt.text}
                                        </button>
                                    ))}

                                    <AnimatePresence>
                                        {microCopy && (
                                            <motion.div
                                                initial={{ opacity: 0, y: 20, scale: 0.8 }}
                                                animate={{ opacity: 1, y: 0, scale: 1 }}
                                                exit={{ opacity: 0, scale: 0.8 }}
                                                transition={{ type: 'spring', damping: 12, stiffness: 200 }}
                                                className="absolute -bottom-20 left-0 w-full text-center z-50 pointer-events-none"
                                            >
                                                <span className="inline-block px-5 py-3 bg-gradient-to-r from-pink-500 to-brand rounded-full text-white text-[15px] font-bold shadow-xl shadow-brand/40 whitespace-nowrap">
                                                    {microCopy}
                                                </span>
                                            </motion.div>
                                        )}
                                    </AnimatePresence>
                                </div>
                            </motion.div>
                        )}

                        {step === 'result' && <ResultView key="result" />}
                    </AnimatePresence>

                    {/* 히스토리 모달 */}
                    <AnimatePresence>
                        {showHistory && (
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm"
                                onClick={closeHistoryModal}
                            >
                                <motion.div
                                    initial={{ scale: 0.9, y: 20 }}
                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.9, y: 20 }}
                                    className="bg-slate-900 border border-white/10 rounded-3xl p-6 w-full max-w-sm shadow-2xl overflow-hidden relative"
                                    onClick={e => e.stopPropagation()}
                                >
                                    <div className="absolute top-[-50px] right-[-50px] w-32 h-32 bg-brand/30 blur-3xl rounded-full"></div>
                                    <h3 className="text-xl font-black text-white mb-6 flex items-center gap-2">
                                        🕒 최근 변화 기록
                                    </h3>

                                    {latestHistoryComparison && (
                                        <div className="mb-4 rounded-2xl border border-cyan-400/20 bg-cyan-400/10 px-4 py-4">
                                            <p className="text-sm font-bold text-cyan-100 break-keep">{latestHistoryComparison.title}</p>
                                            <p className="mt-2 text-[12px] leading-relaxed text-slate-300 break-keep">{latestHistoryComparison.body}</p>
                                        </div>
                                    )}

                                    {latestHistoryInsights && (
                                        <div className="grid grid-cols-2 gap-3 mb-4">
                                            <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-4">
                                                <p className="text-[11px] text-slate-400 font-bold tracking-[0.15em] uppercase">가장 자주 나온 흐름</p>
                                                <p className="mt-2 text-2xl font-black text-white">{latestHistoryInsights.topType?.mbti || '-'}</p>
                                                <p className="mt-1 text-[11px] text-slate-300">
                                                    최근 {latestHistoryInsights.recentCount}회 중 {latestHistoryInsights.topType?.count || 0}회
                                                </p>
                                            </div>
                                            <div className="rounded-2xl border border-white/10 bg-white/5 px-4 py-4">
                                                <p className="text-[11px] text-slate-400 font-bold tracking-[0.15em] uppercase">가장 잘 흔들리는 축</p>
                                                <p className="mt-2 text-lg font-black text-white">{latestHistoryInsights.mostVolatile?.pair || '-'}</p>
                                                <p className="mt-1 text-[11px] text-slate-300">
                                                    {latestHistoryInsights.mostVolatile?.flips
                                                        ? `${latestHistoryInsights.mostVolatile.flips}번 바뀌었어요`
                                                        : "최근엔 거의 그대로였어요"}
                                                </p>
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex flex-col gap-3 max-h-[60vh] overflow-y-auto pr-2">
                                        {historyData.length === 0 ? (
                                            <p className="text-slate-400 text-center py-8 text-sm">아직 기록이 없습니다.<br />오늘 결과가 쌓이면 변화 흐름도 함께 보여드릴게요.</p>
                                        ) : (
                                            historyData.map((item, idx) => (
                                                <div key={idx} className="bg-white/5 border border-white/5 rounded-2xl p-4">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-slate-300 font-medium text-sm">{item.date}</span>
                                                        <div className="flex flex-col items-end gap-1">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-[11px] bg-brand/20 border border-brand/30 text-brand px-2 py-0.5 rounded-full">싱크로율 {item.percent}%</span>
                                                                <span className="text-2xl font-black text-cyan-400 drop-shadow-md">{item.mbti}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <p className="mt-2 text-[12px] text-slate-400 break-keep">{getHistoryEntryNote(item, idx, historyData)}</p>
                                                </div>
                                            ))
                                        )}
                                    </div>

                                    <button onClick={closeHistoryModal} className="w-full py-4 mt-6 bg-white/10 border border-white/10 rounded-2xl text-slate-200 font-bold hover:bg-white/20 transition-colors">
                                        닫기
                                    </button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* 버전 정보 및 업데이트 내역 모달 */}
                    <AnimatePresence>
                        {showVersionModal && (
                            <motion.div
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm"
                                onClick={closeVersionInfo}
                            >
                                <motion.div
                                    initial={{ scale: 0.9, y: 20 }}
                                    animate={{ scale: 1, y: 0 }}
                                    exit={{ scale: 0.9, y: 20 }}
                                    className="bg-slate-900 border border-white/10 rounded-3xl p-6 w-full max-w-sm shadow-2xl overflow-hidden relative"
                                    onClick={e => e.stopPropagation()}
                                >
                                    <div className="absolute top-[-50px] left-[-50px] w-32 h-32 bg-cyan-500/30 blur-3xl rounded-full"></div>
                                    <h3 className="text-xl font-black text-white mb-6 flex items-center gap-2">
                                        🚀 업데이트 소식
                                    </h3>

                                    <div className="flex flex-col gap-6 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
                                        {CHANGELOG.map((item, idx) => (
                                            <div key={idx} className="relative pl-4 border-l-2 border-brand/30">
                                                <div className="absolute -left-[5px] top-1.5 w-2 h-2 bg-brand rounded-full"></div>
                                                <div className="flex justify-between items-baseline mb-2">
                                                    <span className="text-lg font-bold text-white">{item.version}</span>
                                                    <span className="text-xs text-slate-500">{item.date}</span>
                                                </div>
                                                <ul className="space-y-1.5">
                                                    {item.updates.map((upd, i) => (
                                                        <li key={i} className="text-sm text-slate-400 leading-relaxed flex items-start gap-2">
                                                            <span className="text-brand shrink-0">•</span>
                                                            {upd}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        ))}
                                    </div>

                                    <button onClick={closeVersionInfo} className="w-full py-4 mt-8 bg-white/10 border border-white/10 rounded-2xl text-slate-200 font-bold hover:bg-white/20 transition-colors">
                                        확인
                                    </button>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* 하단 버전 표시 */}
                    <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-20">
                        <button
                            onClick={openVersionInfo}
                            className="text-[11px] font-bold text-slate-600 hover:text-slate-400 transition-colors bg-black/20 px-3 py-1 rounded-full border border-white/5 backdrop-blur-sm"
                        >
                            Version {CHANGELOG[0].version}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
